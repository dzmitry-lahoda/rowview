on:
  push:
    branches: [main]
  pull_request:

jobs:
  cargo:
    name: Cargo checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run Cargo checks
        run: |
          cargo f
          cargo c
          cargo t
